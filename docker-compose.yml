version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: translation-service-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
    networks:
      - translation-network
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: translation-service-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - translation-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: translation-service-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: translation_service
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - translation-network

  redis:
    image: redis:alpine
    container_name: translation-service-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - translation-network

networks:
  translation-network:
    driver: bridge

volumes:
  mysql-data:
